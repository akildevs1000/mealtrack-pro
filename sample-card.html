<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Access Card — Sample Preview</title>
<style>
  :root { font-family: Inter, system-ui, sans-serif; }
  body {
    margin: 0;
    background: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 32px 16px;
    color: #0f172a;
  }
  .hint { font-size: 13px; color: #475569; text-align: center; max-width: 420px; }
  .hint b { color: #0f172a; }
  .stage {
    /* On-screen only: drop shadow + rounded so the card stands out. Print CSS
       below strips all of this. */
    box-shadow: 0 10px 30px rgba(2, 8, 23, 0.25);
    border-radius: 8px;
    overflow: hidden;
  }

  /* ---- The card. Mirrors AccessCard in src/routes/employees.tsx ---- */
  .access-card {
    position: relative;
    width: 53.98mm;
    height: 85.6mm;
    padding: 4mm 5mm;
    box-sizing: border-box;
    background: #fff;
    color: #000;
    overflow: hidden;
    font-family: Inter, system-ui, sans-serif;
  }
  .photo-wrap { display: flex; justify-content: center; margin-top: 2mm; }
  .photo-frame {
    width: 26mm; height: 26mm;
    border-radius: 50%;
    overflow: hidden;
    background: #f8fafc;
    border: 0.35mm solid #000;
    box-sizing: border-box;
  }
  .photo-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;   /* anchor to top so the head isn't cut */
  }
  .id-block { text-align: center; margin-top: 2mm; }
  .id-name { font-size: 12px; font-weight: 700; line-height: 1.1; }
  .id-desig { font-size: 13px; font-weight: 700; line-height: 1.1; margin-top: 1mm; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 2mm; margin-top: 2mm; }
  .meta { font-size: 12.5px; font-weight: 700; line-height: 1.4; }
  .qr { background: #fff; }
  .footer {
    position: absolute; left: 0; right: 0; bottom: 4mm;
    padding: 0 3mm;
    text-align: center;
  }
  /* innovo wordmark — inline vector, transparent, centred. */
  .footer .logo {
    display: block;
    width: 30mm;
    height: auto;
    margin: 0 auto;
  }
  .footer .division {
    display: block;
    color: #1a3a6e;                 /* Innovo navy */
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    margin-top: 0.5mm;
    text-rendering: geometricPrecision;
  }
  .footer .domain {
    font-family: Arial, Helvetica, "Inter", sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #000;
    margin-top: 1mm;
    letter-spacing: 0.01em;
  }

  /* ---- Print: exactly one card-sized page, card only ---- */
  @media print {
    @page { size: 53.98mm 85.6mm; margin: 0; }
    html, body {
      background: #fff !important; margin: 0 !important; padding: 0 !important;
      width: 53.98mm !important; height: 85.6mm !important; overflow: hidden !important;
    }
    .hint { display: none !important; }
    .stage { box-shadow: none !important; border-radius: 0 !important; }
    .access-card {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }
  }
</style>
</head>
<body>
  <div class="hint">
    <b>Sample access card</b> — this is a static preview (real cards pull the photo, name,
    designation, grade and company from live data). Press <b>Ctrl&nbsp;+&nbsp;P</b> to see the
    single card-sized print page.
  </div>

  <div class="stage">
    <div class="access-card">
      <div class="photo-wrap">
        <div class="photo-frame">
          <!-- Sample portrait (tall) so the circular crop + upward bias is visible -->
          <img alt="employee" src="data:image/svg+xml;utf8,
            <svg xmlns='http://www.w3.org/2000/svg' width='200' height='260' viewBox='0 0 200 260'>
              <rect width='200' height='260' fill='%23dbeafe'/>
              <circle cx='100' cy='95' r='52' fill='%23f1f5f9'/>
              <circle cx='100' cy='88' r='40' fill='%23cbd5e1'/>
              <path d='M40 260 C40 190 160 190 160 260 Z' fill='%2394a3b8'/>
              <circle cx='100' cy='150' r='34' fill='%23cbd5e1'/>
            </svg>" />
        </div>
      </div>

      <div class="id-block">
        <div class="id-name">Mohammed Abdul</div>
        <div class="id-desig">SAFETY CHARGE HAND</div>
      </div>

      <div class="meta-row">
        <div class="meta">
          <div>INVOW00043</div>
          <div>DOJ: 12/03/2023</div>
          <div>Grade: G4</div>
        </div>
        <div class="qr">
          <!-- Placeholder QR (not scannable — the app renders a real QR of the labour code) -->
          <svg width="50" height="50" viewBox="0 0 50 50" shape-rendering="crispEdges">
            <rect width="50" height="50" fill="#fff"/>
            <g fill="#000">
              <rect x="2" y="2" width="14" height="14"/><rect x="4" y="4" width="10" height="10" fill="#fff"/><rect x="6" y="6" width="6" height="6"/>
              <rect x="34" y="2" width="14" height="14"/><rect x="36" y="4" width="10" height="10" fill="#fff"/><rect x="38" y="6" width="6" height="6"/>
              <rect x="2" y="34" width="14" height="14"/><rect x="4" y="36" width="10" height="10" fill="#fff"/><rect x="6" y="38" width="6" height="6"/>
              <rect x="20" y="4" width="2" height="2"/><rect x="24" y="4" width="2" height="2"/><rect x="28" y="8" width="2" height="2"/>
              <rect x="20" y="10" width="2" height="2"/><rect x="26" y="12" width="2" height="2"/><rect x="30" y="4" width="2" height="2"/>
              <rect x="20" y="20" width="2" height="2"/><rect x="24" y="22" width="2" height="2"/><rect x="28" y="20" width="2" height="2"/>
              <rect x="32" y="24" width="2" height="2"/><rect x="36" y="20" width="2" height="2"/><rect x="40" y="24" width="2" height="2"/>
              <rect x="20" y="28" width="2" height="2"/><rect x="24" y="30" width="2" height="2"/><rect x="20" y="34" width="2" height="2"/>
              <rect x="24" y="38" width="2" height="2"/><rect x="28" y="34" width="2" height="2"/><rect x="32" y="38" width="2" height="2"/>
              <rect x="36" y="34" width="2" height="2"/><rect x="40" y="38" width="2" height="2"/><rect x="44" y="34" width="2" height="2"/>
              <rect x="30" y="30" width="2" height="2"/><rect x="34" y="42" width="2" height="2"/><rect x="42" y="42" width="2" height="2"/>
            </g>
          </svg>
        </div>
      </div>

      <div class="footer">
        <img class="logo" src="innovo-clean.png" alt="innovo" />
        <div class="division">MEP</div>
        <div class="domain">innovogroup.com</div>
      </div>
    </div>
  </div>
</body>
</html>
