<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyMeal — Logs</title>
    <style>
      :root {
        --bg: #0b1120;
        --card: #111a2e;
        --border: #1e2a44;
        --fg: #e7ecf5;
        --muted: #93a1bd;
        --primary: #4f7cff;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--fg);
        font: 13px/1.5 "Segoe UI", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--card);
      }
      header h1 { font-size: 15px; margin: 0; flex: 1; }
      .btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--fg);
        border-radius: 8px;
        padding: 7px 12px;
        font-size: 12.5px;
        cursor: pointer;
      }
      .btn:hover { background: #0e1626; border-color: var(--primary); }
      .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
      label.auto { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; }
      pre {
        flex: 1;
        margin: 0;
        padding: 14px 16px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 12px;
        color: #cbd5ef;
      }
      .empty { color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <h1>Application logs</h1>
      <label class="auto"><input type="checkbox" id="auto" checked /> Auto-refresh</label>
      <button class="btn" id="refresh">Refresh</button>
      <button class="btn" id="openfile">Open file</button>
      <button class="btn" id="openfolder">Open folder</button>
    </header>
    <pre id="log" class="empty">Loading…</pre>
    <script src="logs.js"></script>
  </body>
</html>
